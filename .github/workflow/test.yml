name Run Tests
 
on
  push
    branches [main]
  pull_request
    branches [main]
 
jobs
  test
    runs-on ubuntu-latest
 
    steps
      - name Checkout code
        uses actionscheckout@v4
 
      - name Set up Python
        uses actionssetup-python@v5
        with
          python-version 3.11
 
      - name Install dependencies
        run pip install pytest opencv-python-headless numpy
 
      - name Run tests
        run pytest test_task.py -v